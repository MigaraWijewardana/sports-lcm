<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sports LCM - Delegate Registration</title>
    <link rel="icon" type="image/png" href="assets/Sports LCM Logo - Light.PNG">
    <link rel="stylesheet" href="css/styles.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
</head>
<body class="index-body">

    <a href="https://wa.me/94704533048?text=Hi%20Duwasha,%20I%20have%20a%20question%20about%20Sports%20LCM..." target="_blank" class="whatsapp-widget">
        <svg viewBox="0 0 24 24" fill="currentColor" width="24px" height="24px"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51a12.8 12.8 0 0 0-.57-.01c-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 0 0-3.48-8.413Z"/></svg>
        <span>Message OCVP Delegates</span>
    </a>

    <div class="split-layout">
        
        <div class="delegate-mascot-zone slide-in-left">
            <h2 style="font-size: 1.5rem; color: var(--text-muted);" id="entity-title">LOADING FACTION...</h2>
            
            <div id="dynamic-theme-box" class="hidden" style="width: 100%;">
                <img id="team-mascot-img" src="" alt="Team Mascot" class="giant-mascot">
                <div class="team-badge" id="team-name-display">TEAM NAME</div>
            </div>
            
            <div id="default-theme-box">
                <img src="assets/logo.png" alt="Sports LCM" class="giant-mascot" style="border-radius: 50%; box-shadow: 0 0 50px rgba(255,255,255,0.1);">
            </div>
        </div>

        <div class="action-panel slide-in-right">
            
            <div class="status-badge" style="margin: 0 auto 20px auto;">
                <span class="pulse-dot"></span> REGISTRATION ACTIVE
            </div>

            <h2>SECURE YOUR <span class="text-glow">ROSTER SPOT</span></h2>
            
            <form id="delegate-form">
                <div class="button-grid">
                    <div class="form-group">
                        <label>First Name</label>
                        <input type="text" id="first-name" placeholder="E.g., John" required>
                    </div>
                    <div class="form-group">
                        <label>Last Name</label>
                        <input type="text" id="last-name" placeholder="E.g., Doe" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>WhatsApp Number</label>
                    <input type="text" id="whatsapp" placeholder="E.g., 07XXXXXXXX" required>
                </div>

                <div class="button-grid">
                    <div class="form-group" id="subteam-group">
                        <label>Sub-Team</label>
                        <select id="sub-team" required>
                            <option value="" disabled selected>Select...</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Current Role</label>
                        <select id="role" required>
                            <option value="" disabled selected>Select...</option>
                            <option value="Member">Member</option>
                            <option value="Team Leader">Team Leader</option>
                            <option value="Manager">Manager</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label>Dietary Preference</label>
                    <select id="diet" required>
                        <option value="" disabled selected>Select...</option>
                        <option value="Veg">Vegetarian</option>
                        <option value="Non-Veg">Non-Vegetarian</option>
                    </select>
                </div>

                <div class="form-group" style="display: flex; align-items: center; gap: 10px; margin: 25px 0;">
                    <input type="checkbox" id="confirmation" required style="width: 20px; height: 20px; cursor: pointer;">
                    <label for="confirmation" style="margin: 0; text-transform: none; font-size: 14px; color: #fff; cursor: pointer;">
                        I am ready to awaken my competitiveness and confirm my participation.
                    </label>
                </div>

                <button type="submit" id="submit-btn" style="width: 100%;">JOIN THE ROSTER</button>
                <button type="button" class="outline-btn" onclick="window.location.href='index.html'">BACK TO ARENA GATES</button>
                
                <p id="success-message" class="success-text hidden">Registration Successful! See you on the field.</p>
            </form>
        </div>
    </div>

    <script src="js/firebase.js"></script>
    <script src="js/delegate.js"></script>
</body>
</html>
